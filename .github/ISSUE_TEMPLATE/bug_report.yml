name: Bug report
description: Report a problem with biomedical-data-generator
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide enough information for us to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproducible example
      description: |
        Please provide a minimal code snippet that reproduces the problem.
        Include the random seed and configuration used.
      render: python
      placeholder: |
        from biomedical_data_generator import ...
        # your code here
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full traceback if applicable.
      render: shell
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: biomedical-data-generator version
      placeholder: "e.g. 0.1.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.5"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other relevant information (dependencies, environment, etc.).
    validations:
      required: false
