name: Feature request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe the use case and motivation.

  - type: textarea
    id: use-case
    attributes:
      label: Use case and motivation
      description: |
        What problem does this feature solve? Who would benefit from it?
        Context from teaching, benchmarking, or research scenarios is especially helpful.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How could this be implemented? An API sketch is welcome but not required.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: References, related work, or any other context.
    validations:
      required: false
